l_english:
 
  spanish_collapse.1.t: "Mexican Independece"
  spanish_collapse.1.d: "We have acheieved our freedom in glorious revolution. the Spanish are in retreat and Mexico stands tall. Now its time to get down to the nitty gritty brass tax of establishing our nation. the former captainces general of Guatamala and the Internal Provinces are weak and looking for protection, the economy is in dire need of new investments and we need to determine just what kind of nation we want to be"
  spanish_collapse.1.a: "Viva Mexico!"
  
  spanish_collapse.2.t: "Collapse of Spanish Authority"
  spanish_collapse.2.d: "Spanush Authority in North america has shattered and the Internal Provinces have a decision to make, our country is underdeveloped, underpopulated, and barely holds control of our vast interior. in many ways we are not ready for full Independece, luckily there are two larger states on our border we could sign on with."
  spanish_collapse.2.a: "Raise the Stars and Stripes!"
  spanish_collapse.2.b: "Send our overtures to Mexico City!"
  spanish_collapse.2.c: "Proclaim the Texan Republic!"
  
  spanish_collapse.3.t: "Collapse of Spanish Authority"
  spanish_collapse.3.d: "Spanish Authority has been shattered and for the first time in centuries Central America holds no alligence to any empire. its time for us to make a decision about what our future holds"
  spanish_collapse.3.a: "Proclaim a Republic"
  spanish_collapse.3.b: "Declare Loyalty to Mexico City"
  
  spanish_collapse.4.t: "An Offer from Texas"
  spanish_collapse.4.d: "The Captancy General of the Internal Provinces, the northern most part of spanish america, is in a bit of a bind after the collapse of spanish authority, theyre territory is barely settled, spread across most of the desert southwest. they are not ready for Independece and thus have asked us to sign on to our nation"
  spanish_collapse.4.a: "Free Land? Sure!"
  spanish_collapse.4.b: "We can't defend it, cut them loose"
  
  spanish_collapse.5.t: "an Unexpected Rejection:
  spanish_collapse.5.d: "Our offer of annexation was rejected, leaving us no choice but to try to function as a soverign state"
  spanish_collapse.5.a: "Welp"
  
  spanish_collapse.6.t: "An Offer from Guatamala"
  spanish_collapse.6.d: "The Captancy General of Guatamala, holding the highly strategic Central American Isthmus, has requested to join our country. they are unsure they have the capability to function as an independent state and are seeking union to better resist outside powers"
  spanish_collapse.6.a: "Free Land? Sure!"
  spanish_collapse.6.b: "We can't defend it, cut them loose"
  
  spanish_collapse.7.t: "an Unexpected Rejection:
  spanish_collapse.7.d: "Our offer of annexation was rejected, leaving us no choice but to try to function as a soverign state"
  spanish_collapse.7.a: "Welp"
  
  spanish_collapse.8.t: "The Mexican Nation"
  spanish_collapse.8.d: "Our Nation has emerged from its infancy and taken its first steps on the global stage. we have proven that mexico isn't a backwater or somewhere to be dominated by foreigners. we are a nation equal to any in the world, and we will make sure the great powers remember that"
  spanish_collapse.8.a: "Viva Mexico!
  
  spanish_collapse.9.t: "Mexico Ascendent"
  spanish_collapse.9.d: "Mexico has risen from the ashes of the spanish empire to be a global power in our own right! Our Empire stretches across the globe and our power is undeniable. the world will learn to fear the Mexican Empire!"
  spanish_collapse.9.a: "Viva Mexico!"
  
 spanish_collapse.10.t: "[SCOPE.sState('secession_state').GetName] Secedes"
 spanish_collapse.10.d: "[SCOPE.sState('secession_state').GetName] has declared its secession from [ROOT.GetCountry.GetName]. This has prompted further instability and turmoil in the remaining states of our fragile union."
 spanish_collapse.10.f: ""The [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] signed a decree allowing the remaining states to secede, but this was nothing more than a formality; the dissolution of our confederation was already a reality. But perhaps what was may come again, given time for the wounds of division to heal.""
 spanish_collapse.10.a: "Let them have their independence."
 spanish_collapse.10.b: "They will regret this betrayal."
 
 spanish_collapse.11.t: "The Dissolution of [ROOT.GetCountry.GetName]"
 spanish_collapse.11.d: "The remaining states of the union have declared their independence. It has become clear that the union of [ROOT.GetCountry.GetName] is over, and that [SCOPE.sState('capital_scope').GetName] must fend for itself."
 spanish_collapse.11.f: ""It is reclaiming the ownership of our country, or bowing down to them. It is forgetting the names of our parents, or learning the enemy's ancestors. It is sowing our own land, or seeing them ravage it. It is freedom, or it is war!""
 spanish_collapse.11.a: "We must accept our fate."
 spanish_collapse.11.b: "We will not abandon the union so lightly."